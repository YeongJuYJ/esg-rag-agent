<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .login-container h2 { margin-bottom: 40px; font-size: 22px; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input { width: 75%; padding: 12px 40px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .error { color: red; margin-bottom: 15px; }
        .login-btn { width: 100%; padding: 12px; background: #6A5ACD; color: #fff; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background: #5a4ebc; }
        a { text-decoration: none; color: #6A5ACD; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>ESG AI Agent</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" name="user_id" placeholder="아이디" required>
        </div>
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" name="password" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="login-btn">로그인</button>
    </form>
    <p>또는</p>
    <p>아직 계정이 없나요? <a href="/register">회원가입</a></p>
</div>
</body>
</html>
